name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-vet:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Chromium (for marksheet PDF generation tests)
        run: sudo apt-get update && sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Download dependencies
        run: go mod download

      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -cover
